<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Administração — BilheteAO</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="admin-body">

  <div class="admin-login-container">
    <div class="admin-login-box">
      <div style="font-size:48px;margin-bottom:12px">🔐</div>
      <h1 class="admin-login-title">Painel Admin</h1>
      <p style="color:var(--text-muted);margin-bottom:30px;font-size:0.9rem">BilheteAO — Área Restrita</p>

      <div id="loginError" class="form-error" style="display:none"></div>

      <div class="form-group">
        <label class="form-label">Utilizador</label>
        <input type="text" id="adminUser" class="form-input" placeholder="admin" value="admin">
      </div>
      <div class="form-group">
        <label class="form-label">Palavra-passe</label>
        <input type="password" id="adminPass" class="form-input" placeholder="••••••••">
      </div>
      <button class="btn-purchase" onclick="doLogin()">Entrar no Painel</button>
      <a href="/" style="display:block;margin-top:16px;color:var(--text-muted);text-decoration:none;font-size:0.85rem">← Voltar ao site</a>
    </div>
  </div>

  <script>
    // Se já tiver sessão, redireciona
    if (localStorage.getItem('adminToken')) {
      window.location.href = '/admin/dashboard';
    }

    async function doLogin() {
      const username = document.getElementById('adminUser').value.trim();
      const password = document.getElementById('adminPass').value.trim();
      const errBox = document.getElementById('loginError');
      errBox.style.display = 'none';

      if (!username || !password) {
        errBox.textContent = 'Preencha todos os campos.';
        errBox.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const json = await res.json();

        if (json.success) {
          localStorage.setItem('adminToken', json.token);
          window.location.href = '/admin/dashboard';
        } else {
          errBox.textContent = json.message || 'Credenciais inválidas.';
          errBox.style.display = 'block';
        }
      } catch {
        errBox.textContent = 'Erro de comunicação. Tente novamente.';
        errBox.style.display = 'block';
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
