<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir Senha | BilheteAO</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-shell">
      <section class="auth-box">
        <a href="/" class="auth-logo">BilheteAO</a>
        <h1 class="auth-title">Redefinir senha</h1>
        <p class="auth-sub">Digite a sua nova senha.</p>

        <div id="authError" class="form-error" style="display:none"></div>
        <div id="authSuccess" class="form-success" style="display:none"></div>

        <div class="form-group">
          <label class="form-label">Nova senha</label>
          <input type="password" id="newPassword" class="form-input" placeholder="••••••••" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">Confirmar nova senha</label>
          <input type="password" id="confirmPassword" class="form-input" placeholder="••••••••" autocomplete="new-password">
        </div>

        <button class="btn-purchase" type="button" onclick="doResetPassword()">Redefinir senha</button>

        <p class="auth-switch">Lembrou-se da senha? <a href="/login">Iniciar sessão</a></p>
        <a href="/" class="auth-back">← Voltar aos eventos</a>
      </section>

      <aside class="auth-visual">
        <span class="section-kicker">Segurança</span>
        <h2>Defina uma senha forte para proteger a sua conta.</h2>
        <p>Use pelo menos 6 caracteres, incluindo letras e números.</p>
      </aside>
    </div>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      document.getElementById('authError').textContent = 'Token de recuperação inválido.';
      document.getElementById('authError').style.display = 'block';
    }

    async function doResetPassword() {
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const errBox = document.getElementById('authError');
      const successBox = document.getElementById('authSuccess');
      errBox.style.display = 'none';
      successBox.style.display = 'none';

      if (!newPassword || !confirmPassword) {
        errBox.textContent = 'Preencha todos os campos.';
        errBox.style.display = 'block';
        return;
      }

      if (newPassword !== confirmPassword) {
        errBox.textContent = 'As senhas não coincidem.';
        errBox.style.display = 'block';
        return;
      }

      if (newPassword.length < 6) {
        errBox.textContent = 'A senha deve ter pelo menos 6 caracteres.';
        errBox.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, newPassword })
        });
        const json = await res.json();

        if (json.success) {
          successBox.textContent = json.message;
          successBox.style.display = 'block';
          setTimeout(() => window.location.href = '/login', 3000);
        } else {
          errBox.textContent = json.message;
          errBox.style.display = 'block';
        }
      } catch {
        errBox.textContent = 'Erro de comunicação. Tente novamente.';
        errBox.style.display = 'block';
      }
    }
  </script>
</body>
</html>
