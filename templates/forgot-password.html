<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Esqueceu a Senha | BilheteAO</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
  <div class="auth-container">
    <div class="auth-shell">
      <section class="auth-box">
        <a href="/" class="auth-logo">BilheteAO</a>
        <h1 class="auth-title">Recuperar senha</h1>
        <p class="auth-sub">Digite o seu e-mail para receber um link de recuperação.</p>

        <div id="authError" class="form-error" style="display:none"></div>
        <div id="authSuccess" class="form-success" style="display:none"></div>

        <div class="form-group">
          <label class="form-label">E-mail</label>
          <input type="email" id="email" class="form-input" placeholder="o.seu@email.com" autocomplete="email">
        </div>

        <button class="btn-purchase" type="button" onclick="doForgotPassword()">Enviar link de recuperação</button>

        <p class="auth-switch">Lembrou-se da senha? <a href="/login">Iniciar sessão</a></p>
        <a href="/" class="auth-back">← Voltar aos eventos</a>
      </section>

      <aside class="auth-visual">
        <span class="section-kicker">Recuperação segura</span>
        <h2>Receba um link seguro para redefinir a sua senha.</h2>
        <p>O link será enviado para o seu e-mail e expirará em 15 minutos.</p>
      </aside>
    </div>
  </div>

  <script>
    async function doForgotPassword() {
      const email = document.getElementById('email').value.trim();
      const errBox = document.getElementById('authError');
      const successBox = document.getElementById('authSuccess');
      errBox.style.display = 'none';
      successBox.style.display = 'none';

      if (!email) {
        errBox.textContent = 'Digite o seu e-mail.';
        errBox.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const json = await res.json();

        if (json.success) {
          successBox.textContent = json.message;
          successBox.style.display = 'block';
        } else {
          errBox.textContent = json.message;
          errBox.style.display = 'block';
        }
      } catch {
        errBox.textContent = 'Erro de comunicação. Tente novamente.';
        errBox.style.display = 'block';
      }
    }
  </script>
</body>
</html>
