<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Validação | BilheteAO</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <main class="main-content">
    <div class="container" style="max-width:620px;text-align:center">
      <div class="loading-state">
        <div class="spinner"></div>
        <p>A abrir a validação no painel do administrador...</p>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code = params.get('code');
    const target = `/admin/dashboard?tab=validate${code ? `&code=${encodeURIComponent(code)}` : ''}`;
    if (localStorage.getItem('adminToken')) {
      window.location.replace(target);
    } else {
      window.location.replace(`/admin?redirect=${encodeURIComponent(target)}`);
    }
  </script>
</body>
</html>
